  bio: "Fatih Aksu is a Postdoctoral Researcher at Università Campus Bio-Medico di Roma (UCBM). He earned his PhD in Artificial Intelligence (Health and Life Sciences) from UCBM, where his doctoral work centered on advancing multimodal deep learning through intermediate fusion strategies and designing resilient AI frameworks that integrate federated learning with triplet networks. He received his B.Sc. and M.Sc. degrees in Electrical and Electronics Engineering from Middle East Technical University. His research focuses on deep learning methods applied to biomedical domains, with a particular emphasis on the diagnosis and prognosis of lung cancer. Methodologically, his work spans multimodal deep learning, synthetic image generation, 3D medical vision foundation models, digital pathology analysis using whole slide images, and resilient AI frameworks."
