  bio: "Valerio Guarrasi is an Associate Professor at Saint Camillus International University of Health and Medical Sciences (UniCamillus). Previously, he served as an Assistant Professor at Università Campus Bio-Medico di Roma. He earned a PhD in Data Science from Sapienza University of Rome, following a Master’s Degree in Data Science and a Bachelor’s Degree in Management Engineering. His research focuses on multimodal deep learning and generative artificial intelligence (AI), with a strong emphasis on developing innovative methodologies for biomedical applications. He is particularly interested in how AI can enhance healthcare by improving diagnostics and patient outcomes. Dr. Guarrasi has contributed to several high-impact projects at the intersection of AI and medicine, covering topics such as AI-driven medical imaging, synthetic data generation, and multimodal fusion strategies. He has participated in numerous national and international projects in the field of AI for health, collaborating with clinical centers, universities, and technology companies. His results have been published in international scientific journals and recognized in globally significant competitions. He was selected by the IEEE Computer Society as one of “Computing’s Top 30 Early Career Professionals.”"
