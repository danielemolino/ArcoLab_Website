  bio: "Filippo Ruffini is a PhD student enrolled in the Italian National Program in Artificial Intelligence, jointly affiliated with Università Campus Bio-Medico di Roma (UCBM) and Umeå University (Department of Diagnostics and Intervention). He received his Bachelor's degree in Medical Engineering from the University of Rome Tor Vergata, and his Master's degree in Biomedical Engineering, with honors (summa cum laude). His research focuses on trustworthy multimodal AI for oncology, spanning survival prediction, radiology vision-language models, medical image synthesis, and cross-modal retrieval. He is particularly interested in building models that fuse heterogeneous clinical data, imaging, tabular, and textual, into robust, interpretable representations for personalized cancer care. His work combines large-scale HPC infrastructure with end-to-end deep learning pipelines built on PyTorch and MONAI."
